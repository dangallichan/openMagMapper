<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>openMagMapper GLB Viewer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b0f14;
      color: #e6edf3;
      font-family: Segoe UI, Tahoma, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 14, 20, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
      max-width: min(92vw, 560px);
    }
    #hud h1 {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    input[type="text"] {
      background: #101722;
      color: #e6edf3;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      height: 30px;
      padding: 0 8px;
      width: min(360px, 65vw);
    }
    button, label.file-btn {
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 7px;
      background: #172232;
      color: #e6edf3;
      padding: 0 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      font-size: 13px;
    }
    button:hover, label.file-btn:hover {
      background: #203148;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.9;
      min-height: 1.2em;
      word-break: break-word;
    }
    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <h1>openMagMapper Local GLB Viewer</h1>
      <div id="controls">
        <input id="modelPath" type="text" value="../dataKeep/magnetOnTable94_aligned.glb" title="Relative URL from this page" />
        <button id="loadPathBtn" type="button">Load Path</button>
        <input id="frozenPath" type="text" value="../dataKeep/Exp_cam_frozenVectors_USBwebcam_JLC1080_20260716_143634.csv" title="Relative CSV path from this page" />
        <button id="loadFrozenBtn" type="button">Load Frozen CSV</button>
        <label class="file-btn" for="fileInput">Open Local File</label>
        <input id="fileInput" type="file" accept=".glb,.gltf" />
        <button id="fitBtn" type="button">Fit Camera</button>
      </div>
      <div id="status">Ready.</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');
    const pathInput = document.getElementById('modelPath');
    const loadPathBtn = document.getElementById('loadPathBtn');
    const frozenPathInput = document.getElementById('frozenPath');
    const loadFrozenBtn = document.getElementById('loadFrozenBtn');
    const fileInput = document.getElementById('fileInput');
    const fitBtn = document.getElementById('fitBtn');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f14);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 1000);
    camera.position.set(1.8, 1.2, 2.1);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const hemi = new THREE.HemisphereLight(0xbfd9ff, 0x141b22, 1.1);
    scene.add(hemi);

    const key = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(2.5, 3.0, 2.0);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x99c1ff, 0.45);
    fill.position.set(-2.0, 1.5, -1.5);
    scene.add(fill);

    const grid = new THREE.GridHelper(10, 40, 0x35506f, 0x243447);
    grid.material.opacity = 0.3;
    grid.material.transparent = true;
    scene.add(grid);

    const axes = new THREE.AxesHelper(0.3);
    scene.add(axes);

    const loader = new GLTFLoader();
    let activeRoot = null;
    let frozenRoot = null;

    const BASE_VIEW_SCALE_M_PER_UT = 15e-2 / 1000.0;
    const VECTOR_SCALE_MULTIPLIER = 5.0;
    const VECTOR_LENGTH_POWER = 0.5;
    const SHAFT_RADIUS = 0.002;
    const HEAD_RADIUS = 0.006;
    const HEAD_LENGTH = 0.02;

    // CSV coordinates are produced in the Blender/table frame (Z-up).
    // Three.js/glTF scene uses Y-up, so convert with X unchanged and rotate
    // -90 deg around X: (x, y, z) -> (x, z, -y).
    function blenderToThree(v) {
      return new THREE.Vector3(v.x, v.z, -v.y);
    }

    function scaleMagneticVector(vec) {
      const mag = vec.length();
      if (!Number.isFinite(mag) || mag <= 0) {
        return { scaled: new THREE.Vector3(), magnitude: 0 };
      }
      const unit = vec.clone().normalize();
      const scaledLen = BASE_VIEW_SCALE_M_PER_UT * VECTOR_SCALE_MULTIPLIER * Math.pow(mag, VECTOR_LENGTH_POWER);
      return { scaled: unit.multiplyScalar(scaledLen), magnitude: mag };
    }

    function lerp(a, b, t) {
      return a * (1 - t) + b * t;
    }

    function magnitudeToColor(mag, minMag, maxMag) {
      if (!Number.isFinite(mag)) return new THREE.Color(0.7, 0.7, 0.7);
      if (!Number.isFinite(minMag) || !Number.isFinite(maxMag) || maxMag <= minMag) {
        return new THREE.Color(0.1, 0.9, 0.9);
      }
      const t = Math.max(0, Math.min(1, (mag - minMag) / (maxMag - minMag)));
      if (t < 0.5) {
        const u = t / 0.5;
        return new THREE.Color(lerp(0.08, 0.10, u), lerp(0.35, 0.95, u), lerp(1.0, 0.95, u));
      }
      const u = (t - 0.5) / 0.5;
      return new THREE.Color(lerp(0.10, 1.0, u), lerp(0.95, 0.92, u), lerp(0.95, 0.20, u));
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function clearModel() {
      if (!activeRoot) return;
      scene.remove(activeRoot);
      activeRoot.traverse((obj) => {
        if (!obj.isMesh) return;
        if (obj.geometry) obj.geometry.dispose();
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const m of mats) {
          if (m && m.dispose) m.dispose();
        }
      });
      activeRoot = null;
    }

    function clearFrozenVectors() {
      if (!frozenRoot) return;
      scene.remove(frozenRoot);
      frozenRoot.traverse((obj) => {
        if (!obj.isMesh) return;
        if (obj.geometry) obj.geometry.dispose();
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        for (const m of mats) {
          if (m && m.dispose) m.dispose();
        }
      });
      frozenRoot = null;
    }

    function fitCameraToLoadedContent() {
      const box = new THREE.Box3();
      let hasContent = false;
      if (activeRoot) {
        box.expandByObject(activeRoot);
        hasContent = true;
      }
      if (frozenRoot) {
        box.expandByObject(frozenRoot);
        hasContent = true;
      }
      if (!hasContent || box.isEmpty()) return;

      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z) * 0.55 || 0.5;

      controls.target.copy(center);
      camera.position.copy(center).add(new THREE.Vector3(radius * 2.0, radius * 1.4, radius * 2.2));
      camera.near = Math.max(radius / 500, 0.001);
      camera.far = Math.max(radius * 60, 50);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function fitCameraToObject(object3D) {
      const box = new THREE.Box3().setFromObject(object3D);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z) * 0.55 || 0.5;

      controls.target.copy(center);
      camera.position.copy(center).add(new THREE.Vector3(radius * 2.0, radius * 1.4, radius * 2.2));
      camera.near = Math.max(radius / 500, 0.001);
      camera.far = Math.max(radius * 60, 50);
      camera.updateProjectionMatrix();
      controls.update();
    }

    function onModelLoaded(gltf, sourceName) {
      clearModel();
      activeRoot = gltf.scene;
      scene.add(activeRoot);
      fitCameraToLoadedContent();
      setStatus(`Loaded: ${sourceName}`);
    }

    function parseFrozenCsv(text) {
      const lines = text.split(/\r?\n/).filter((line) => line.trim().length > 0);
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map((h) => h.trim());
      const getIndex = (name) => headers.indexOf(name);

      const ix = getIndex('sensor_table_x_m');
      const iy = getIndex('sensor_table_y_m');
      const iz = getIndex('sensor_table_z_m');
      const ivx = getIndex('mag_table_x_uT');
      const ivy = getIndex('mag_table_y_uT');
      const ivz = getIndex('mag_table_z_uT');
      if ([ix, iy, iz, ivx, ivy, ivz].some((v) => v < 0)) return [];

      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',');
        if (cols.length < headers.length) continue;

        const ox = Number(cols[ix]);
        const oy = Number(cols[iy]);
        const oz = Number(cols[iz]);
        const vx = Number(cols[ivx]);
        const vy = Number(cols[ivy]);
        const vz = Number(cols[ivz]);
        if (![ox, oy, oz, vx, vy, vz].every(Number.isFinite)) continue;

        rows.push({
          origin: blenderToThree(new THREE.Vector3(ox, oy, oz)),
          vecUT: blenderToThree(new THREE.Vector3(vx, vy, vz)),
          magnitude: new THREE.Vector3(vx, vy, vz).length(),
        });
      }
      return rows;
    }

    function makeFrozenArrow(origin, vecUT, color) {
      const { scaled } = scaleMagneticVector(vecUT);
      if (scaled.length() < 1e-9) return null;

      const start = origin.clone().sub(scaled.clone().multiplyScalar(0.5));
      const end = origin.clone().add(scaled.clone().multiplyScalar(0.5));
      const axis = end.clone().sub(start);
      const totalLen = axis.length();
      const dir = axis.clone().normalize();
      const headLen = Math.min(HEAD_LENGTH, totalLen * 0.45);
      const shaftLen = Math.max(totalLen - headLen, totalLen * 0.55);

      const shaftGeo = new THREE.CylinderGeometry(SHAFT_RADIUS, SHAFT_RADIUS, shaftLen, 10);
      const headGeo = new THREE.ConeGeometry(HEAD_RADIUS, headLen, 12);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.0 });

      const shaft = new THREE.Mesh(shaftGeo, mat);
      const head = new THREE.Mesh(headGeo, mat.clone());

      const shaftCenter = start.clone().add(dir.clone().multiplyScalar(shaftLen * 0.5));
      const headCenter = start.clone().add(dir.clone().multiplyScalar(shaftLen + headLen * 0.5));

      const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      shaft.position.copy(shaftCenter);
      shaft.quaternion.copy(q);
      head.position.copy(headCenter);
      head.quaternion.copy(q);

      const group = new THREE.Group();
      group.add(shaft);
      group.add(head);
      return group;
    }

    async function loadFrozenVectors(path) {
      if (!path) {
        setStatus('Enter a frozen CSV path first.');
        return;
      }
      setStatus(`Loading frozen vectors from ${path} ...`);

      try {
        const res = await fetch(path);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const text = await res.text();
        const rows = parseFrozenCsv(text);
        if (!rows.length) {
          throw new Error('No valid frozen-vector rows found in CSV.');
        }

        clearFrozenVectors();
        frozenRoot = new THREE.Group();
        frozenRoot.name = 'FrozenVectors';

        const mags = rows.map((r) => r.magnitude).filter(Number.isFinite);
        const minMag = Math.min(...mags);
        const maxMag = Math.max(...mags);

        for (const row of rows) {
          const color = magnitudeToColor(row.magnitude, minMag, maxMag);
          const arrow = makeFrozenArrow(row.origin, row.vecUT, color);
          if (arrow) frozenRoot.add(arrow);
        }

        scene.add(frozenRoot);
        fitCameraToLoadedContent();
        setStatus(`Loaded model + ${frozenRoot.children.length} frozen vectors.`);
      } catch (err) {
        setStatus(`Failed to load frozen vectors ${path}: ${err?.message || err}`);
      }
    }

    function loadFromPath(path) {
      if (!path) {
        setStatus('Enter a model path first.');
        return;
      }
      setStatus(`Loading ${path} ...`);
      loader.load(
        path,
        (gltf) => onModelLoaded(gltf, path),
        undefined,
        (err) => setStatus(`Failed to load ${path}: ${err?.message || err}`)
      );
    }

    function loadFromFile(file) {
      if (!file) return;
      const url = URL.createObjectURL(file);
      setStatus(`Loading local file ${file.name} ...`);
      loader.load(
        url,
        (gltf) => {
          onModelLoaded(gltf, file.name);
          URL.revokeObjectURL(url);
        },
        undefined,
        (err) => {
          setStatus(`Failed to load file ${file.name}: ${err?.message || err}`);
          URL.revokeObjectURL(url);
        }
      );
    }

    loadPathBtn.addEventListener('click', () => loadFromPath(pathInput.value.trim()));
    loadFrozenBtn.addEventListener('click', () => loadFrozenVectors(frozenPathInput.value.trim()));
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      loadFromFile(file);
    });
    fitBtn.addEventListener('click', () => {
      fitCameraToLoadedContent();
    });

    const url = new URL(window.location.href);
    const modelParam = url.searchParams.get('model');
    if (modelParam) {
      pathInput.value = modelParam;
    }
    const frozenParam = url.searchParams.get('frozen');
    if (frozenParam) {
      frozenPathInput.value = frozenParam;
    }
    loadFromPath(pathInput.value.trim());
    loadFrozenVectors(frozenPathInput.value.trim());

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
